target_allocation:
  core:
    min: 0.70
    target: 0.80
    max: 0.90
  satellite:
    min: 0.10
    target: 0.20
    max: 0.30

action_priority:
  increase_dca: 1
  decrease_dca: 2
  review_thesis: 3
  exceptional_buy_review: 4
  consider_rebalance_sell: 5
  hold_observe: 6
  block_action: 7

rules:
  default_when_uncertain: core
  immediate_buy_is_exception: true
  prefer_dca_over_sell: true
  min_trade_pct: 0.01

target_weighting:
  enabled: true
  blend: 0.35
  weights:
    efficiency: 0.50
    risk: 0.30
    thesis: 0.15
    data_quality: 0.05
  thesis_multiplier:
    intact: 1.0
    watch: 0.7
    unknown: 0.8
    broken: 0.2
